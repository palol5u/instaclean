<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaClean Pro | Fix 0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .success-border { border-color: #22c55e !important; background-color: #f0fdf4 !important; }
        .loading-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20 font-sans">

    <nav class="bg-white border-b border-gray-200 py-4 mb-8">
        <div class="max-w-5xl mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center space-x-2 text-purple-600">
                <i class="fa-solid fa-bolt-lightning text-2xl"></i>
                <span class="text-xl font-black tracking-tighter uppercase">InstaClean Turbo</span>
            </div>
            <button onclick="location.reload()" class="text-xs font-bold text-gray-400 hover:text-red-500 transition">
                <i class="fa-solid fa-rotate-right mr-1"></i> RESET
            </button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4">
        
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-gray-900 mb-2">Analyse des listes</h1>
            <p class="text-gray-500 text-sm">Déposez vos fichiers pour identifier ceux qui ne vous suivent pas.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <label for="fileFollowers" id="zoneFollowers" class="bg-white p-8 rounded-3xl border-2 border-dashed border-gray-300 transition-all text-center relative cursor-pointer hover:border-purple-400">
                <input type="file" id="fileFollowers" class="hidden" accept=".json">
                <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-users text-xl"></i>
                </div>
                <h3 class="font-bold text-gray-800 text-sm">followers_1.json</h3>
                <div id="statusFollowers" class="mt-2 text-[10px] font-black text-gray-400 uppercase tracking-widest text-center">En attente</div>
            </label>

            <label for="fileFollowing" id="zoneFollowing" class="bg-white p-8 rounded-3xl border-2 border-dashed border-gray-300 transition-all text-center relative cursor-pointer hover:border-purple-400">
                <input type="file" id="fileFollowing" class="hidden" accept=".json">
                <div class="w-12 h-12 bg-pink-100 text-pink-600 rounded-xl flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-user-plus text-xl"></i>
                </div>
                <h3 class="font-bold text-gray-800 text-sm">following.json</h3>
                <div id="statusFollowing" class="mt-2 text-[10px] font-black text-gray-400 uppercase tracking-widest text-center">En attente</div>
            </label>
        </div>

        <div id="actionPanel" class="hidden text-center mb-10">
            <div class="inline-flex items-center space-x-4 bg-gray-900 text-white p-2 pl-6 rounded-2xl shadow-2xl">
                <span class="text-sm font-bold"><span id="countNonFollowers" class="text-purple-400">0</span> comptes à supprimer</span>
                <button id="downloadBtn" class="bg-purple-600 hover:bg-purple-500 px-6 py-3 rounded-xl font-black text-xs uppercase transition">
                    Exporter CSV
                </button>
            </div>
        </div>

        <div id="resultCard" class="bg-white rounded-3xl shadow-sm border border-gray-200 overflow-hidden hidden">
            <table class="w-full text-left">
                <tbody id="tableBody" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </main>

    <script>
        let dataFollowers = null;
        let dataFollowing = null;

        document.getElementById('fileFollowers').addEventListener('change', (e) => processFile(e.target.files[0], 'followers'));
        document.getElementById('fileFollowing').addEventListener('change', (e) => processFile(e.target.files[0], 'following'));

        function processFile(file, type) {
            if (!file) return;
            const statusLabel = document.getElementById(type === 'followers' ? 'statusFollowers' : 'statusFollowing');
            statusLabel.innerText = "Lecture...";

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const json = JSON.parse(e.target.result);
                    let list = [];

                    // --- L'EXTRACTEUR UNIVERSEL ---
                    const items = type === 'followers' ? json : (json.relationships_following || []);
                    
                    list = items.map(item => {
                        // On cherche le nom soit dans .title, soit dans .string_list_data[0].value
                        if (item.string_list_data && item.string_list_data[0] && item.string_list_data[0].value) {
                            return item.string_list_data[0].value;
                        }
                        if (item.title) return item.title;
                        return null;
                    }).filter(name => name !== null);

                    if (type === 'followers') dataFollowers = list;
                    else dataFollowing = list;

                    // Update UI
                    document.getElementById(type === 'followers' ? 'zoneFollowers' : 'zoneFollowing').classList.add('success-border');
                    statusLabel.innerText = `${list.length} noms trouvés ✓`;
                    statusLabel.classList.replace('text-gray-400', 'text-green-500');

                    checkReady();
                } catch (err) {
                    statusLabel.innerText = "Erreur fichier";
                    console.error(err);
                }
            };
            reader.readAsText(file);
        }

        function checkReady() {
            if (dataFollowers && dataFollowing) {
                const followersSet = new Set(dataFollowers);
                // On garde ceux qui sont dans Following mais PAS dans Followers
                const finalDiff = dataFollowing.filter(user => !followersSet.has(user));
                
                renderResults(finalDiff);
            }
        }

        function renderResults(list) {
            document.getElementById('countNonFollowers').innerText = list.length;
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = list.map(user => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="px-8 py-3 text-sm font-bold text-gray-800">@${user}</td>
                    <td class="px-8 py-3 text-right">
                        <a href="https://instagram.com/${user}" target="_blank" class="text-[10px] font-black bg-gray-100 px-3 py-1.5 rounded-lg hover:bg-purple-600 hover:text-white transition uppercase">Voir</a>
                    </td>
                </tr>
            `).join('');

            document.getElementById('actionPanel').classList.remove('hidden');
            document.getElementById('resultCard').classList.remove('hidden');

            document.getElementById('downloadBtn').onclick = () => {
                const csv = "username\n" + list.join("\n");
                const blob = new Blob([csv], {type: 'text/csv'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "non_followers_instaclean.csv";
                a.click();
            };
        }
    </script>
</body>
</html>
