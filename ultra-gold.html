<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ultra Gold | InstaClean Turbo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Design Ultra Premium avec halo lumineux en fond */
        body { 
            background: #050505; 
            background-image: radial-gradient(circle at 50% 0%, #1a1500 0%, #050505 70%);
            color: white; 
            font-family: 'Inter', sans-serif; 
        }
        .gold-gradient { 
            background: linear-gradient(135deg, #DFB75A 0%, #FCF6BA 50%, #B38728 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-shadow: 0 0 30px rgba(223, 183, 90, 0.2);
        }
        .gold-button { 
            background: linear-gradient(135deg, #BF953F, #B38728); 
            box-shadow: 0 10px 40px rgba(179, 135, 40, 0.4); 
            border: 1px solid #FCF6BA; /* Bordure dorée pour faire ressortir le bouton */
            cursor: grab; /* Indique qu'on peut le glisser */
            transition: all 0.3s ease;
        }
        .gold-button:hover {
            box-shadow: 0 15px 50px rgba(179, 135, 40, 0.6); 
            transform: translateY(-2px);
        }
        .gold-button:active { cursor: grabbing; }
        .gold-border { 
            border: 1px solid rgba(223, 183, 90, 0.3); 
            box-shadow: inset 0 0 30px rgba(191, 149, 63, 0.05), 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-8 text-center">

    <div class="max-w-4xl w-full">

            <p class="text-[10px] text-gray-400 uppercase font-bold mb-6">Glissez ce bouton vers votre barre de favoris :</p>
            
            <a href="javascript:(function(){const APP_ID='936619743392459';const getCookie=n=>document.cookie.split('; ').find(r=>r.startsWith(n+'='))?.split('=')[1];const csrftoken=getCookie('csrftoken');const myId=getCookie('ds_user_id');if(!csrftoken||!myId){alert('Erreur: Connecte-toi à Instagram!');return;}const panel=document.createElement('div');panel.style='position:fixed;top:20px;left:50%;transform:translateX(-50%);width:380px;background:#050505;border:2px solid #BF953F;border-radius:25px;padding:25px;z-index:100000;box-shadow:0 25px 60px rgba(0,0,0,0.9);color:white;font-family:sans-serif;text-align:center;';panel.innerHTML='<div style=\x22font-weight:900;font-size:12px;color:#BF953F;text-transform:uppercase;letter-spacing:3px;margin-bottom:15px;\x22>Ultra Gold V3.0</div><div id=\x22g_status\x22 style=\x22font-size:18px;font-weight:900;margin-bottom:5px;letter-spacing:1px;\x22>Initialisation...</div><div id=\x22g_val\x22 style=\x22height:24px;margin-bottom:5px;display:flex;justify-content:center;align-items:center;\x22></div><div id=\x22g_info\x22 style=\x22font-size:11px;color:#888;margin-bottom:15px;text-transform:uppercase;\x22>Algorithme Furtif Actif</div><div style=\x22width:100%;background:#222;height:6px;border-radius:10px;overflow:hidden;\x22><div id=\x22g_bar\x22 style=\x22width:5%;height:100%;background:#BF953F;transition:all 0.5s;\x22></div></div><div id=\x22g_count\x22 style=\x22font-size:10px;margin-top:15px;font-weight:bold;color:#BF953F;\x22>Mode Rapide</div>';document.body.appendChild(panel);const fetchAll=async(e)=>{let l=[];let m='';do{const r=await fetch('https://www.instagram.com/api/v1/friendships/'+e+'/?count=100&max_id='+m,{headers:{'X-IG-App-ID':APP_ID}});const d=await r.json();l=l.concat(d.users.map(u=>({id:u.pk,n:u.username})));m=d.next_max_id;document.getElementById('g_status').innerText='Scan : '+l.length;}while(m);return l;};(async()=>{try{const flrs=await fetchAll(myId+'/followers');const fIds=new Set(flrs.map(u=>u.id));document.getElementById('g_bar').style.width='50%';const fing=await fetchAll(myId+'/following');const targets=fing.filter(u=>!fIds.has(u.id));document.getElementById('g_bar').style.width='100%';document.getElementById('g_status').innerText=targets.length+' cibles trouvées';for(let i=0;i<targets.length;i++){const t=targets[i];document.getElementById('g_status').innerText='@'+t.n;document.getElementById('g_val').innerHTML='';document.getElementById('g_count').innerText='NETTOYAGE '+(i+1)+'/'+targets.length;await fetch('https://www.instagram.com/api/v1/friendships/destroy/'+t.id+'/',{method:'POST',headers:{'X-CSRFToken':csrftoken,'X-IG-App-ID':APP_ID}});document.getElementById('g_val').innerHTML='<span style=\x22color:#22c55e;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);padding:4px 12px;border-radius:20px;font-size:10px;font-weight:900;\x22>✓ DÉSABONNÉ</span>';const sLimit=Math.floor(Math.random()*15)+15;let s=sLimit;const timer=setInterval(()=>{s--;document.getElementById('g_info').innerText='Suivant dans : '+s+'s';if(s<=0)clearInterval(timer);},1000);await new Promise(r=>setTimeout(r,sLimit*1000));}}catch(e){document.getElementById('g_status').innerText='ERREUR';}})();})();" 
               class="gold-button inline-block text-black font-black px-12 py-5 rounded-2xl mb-8">
                LANCER ULTRA GOLD
            </a>
            
            <p class="text-[10px] text-yellow-500/50 uppercase tracking-[0.3em] font-black italic">

            </p>
        </div>
    </div>

</body>
</html>
