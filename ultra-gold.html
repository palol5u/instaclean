tElementById('g_info').innerText='Lecture des Abonnés...';const followers=await fetchAll(myId+'/followers');const fIds=new Set(followers.map(u=>u.user_id));document.getElementById('g_bar').style.width='50%';document.getElementById('g_info').innerText='Lecture des Abonnements...';const following=await fetchAll(myId+'/following');const toUnfollow=following.filter(u=>!fIds.has(u.user_id));document.getElementById('g_bar').style.width='100%';document.getElementById('g_status').innerText=toUnfollow.length+' cibles trouvées';for(let i=0;i<toUnfollow.length;i++){const user=toUnfollow[i];document.getElementById('g_status').innerText='@'+user.username;document.getElementById('g_count').innerText='ACTION '+(i+1)+' / '+toUnfollow.length;/* ACTION ET VALIDATION */await fetch('https://www.instagram.com/api/v1/friendships/destroy/'+user.user_id+'/',{method:'POST',headers:{'X-CSRFToken':csrftoken,'X-IG-App-ID':APP_ID}});document.getElementById('g_status').innerText='✅ @'+user.username;document.getElementById('g_info').innerText='Action validée !';/* DELAI */const delay=Math.floor(Math.random()*(90000-60000+1)+60000);let s=Math.round(delay/1000);const timer=setInterval(()=>{s--;document.getElementById('g_info').innerText='Sécurité Anti-Ban : '+s+'s';if(s<=0)clearInterval(timer);},1000);await new Promise(r=>setTimeout(r,delay));}}catch(e){document.getElementById('g_status').innerText='ERREUR';document.getElementById('g_info').innerText='Rafraîchir la page';}})();})();"
